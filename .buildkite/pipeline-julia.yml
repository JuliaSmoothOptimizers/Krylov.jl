asteps:
  - label: "CPUs -- StaticArrays.jl"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.10"
    agents:
      queue: "juliaecosystem"
      os: "linux"
      arch: "x86_64"
    command: |
      julia --color=yes --project -e '
        using Pkg
        Pkg.add("StaticArrays")
        Pkg.instantiate()
        include("test/cpu/static_arrays.jl")'
    timeout_in_minutes: 30

  - label: "CPUs -- ComponentArrays.jl"
